<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Triage Chatbot</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f6fc;
            padding: 16px;
        }

        .chat-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 32px);
        }

        .chat-header {
            background: #1f6feb;
            color: white;
            padding: 28px 24px 24px;
        }

        .chat-header h1 {
            margin: 0 0 8px;
            font-size: 2.3rem;
            line-height: 1.1;
        }

        .chat-header p {
            margin: 0;
            font-size: 1.25rem;
            opacity: 0.95;
        }

        .example-box {
            margin: 22px 20px 12px;
            background: #fff3cd;
            color: #7a5a00;
            border-radius: 14px;
            padding: 16px 18px;
            font-size: 1.05rem;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 420px;
            max-height: 65vh;
            scroll-behavior: smooth;
        }

        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-row.bot {
            justify-content: flex-start;
        }

        .message {
            padding: 16px 18px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 1rem;
            max-width: 78%;
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user {
            background: #1f6feb;
            color: white;
            border-bottom-right-radius: 6px;
        }

        .message.bot {
            background: #eaf3ff;
            color: #2b2b2b;
            border-bottom-left-radius: 6px;
        }

        .input-area {
            border-top: 1px solid #e1e7f0;
            padding: 16px 20px 20px;
            background: #ffffff;
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: stretch;
        }

        .input-row input {
            flex: 1;
            min-width: 0;
            padding: 16px 18px;
            font-size: 1rem;
            border: 1px solid #c7d7ee;
            border-radius: 14px;
            outline: none;
        }

        .input-row input:focus {
            border-color: #1f6feb;
            box-shadow: 0 0 0 3px rgba(31, 111, 235, 0.12);
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        button {
            border: none;
            border-radius: 14px;
            padding: 0 22px;
            min-height: 54px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        button:hover {
            opacity: 0.95;
            transform: translateY(-1px);
        }

        .send-btn {
            background: #1f6feb;
            color: white;
        }

        .reset-btn {
            background: #e63946;
            color: white;
        }

        @media (max-width: 992px) {
            .chat-wrapper {
                min-height: calc(100vh - 24px);
            }

            .chat-header h1 {
                font-size: 2rem;
            }

            .chat-header p {
                font-size: 1.1rem;
            }

            .message {
                max-width: 86%;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .chat-wrapper {
                border-radius: 16px;
                min-height: calc(100vh - 20px);
            }

            .chat-header {
                padding: 22px 18px 20px;
            }

            .chat-header h1 {
                font-size: 1.8rem;
            }

            .chat-header p {
                font-size: 1rem;
            }

            .example-box {
                margin: 16px 14px 10px;
                padding: 14px;
                font-size: 0.98rem;
            }

            .chat-box {
                padding: 14px;
                min-height: 360px;
                max-height: 60vh;
            }

            .message {
                max-width: 90%;
                font-size: 0.98rem;
                padding: 14px 15px;
            }

            .input-area {
                padding: 14px;
            }

            .input-row {
                flex-direction: column;
            }

            .button-group {
                width: 100%;
                display: grid;
                grid-template-columns: 1fr 1fr;
            }

            .button-group button {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 0;
            }

            .chat-wrapper {
                min-height: 100vh;
                border-radius: 0;
            }

            .chat-header {
                padding: 18px 14px;
            }

            .chat-header h1 {
                font-size: 1.55rem;
            }

            .chat-header p {
                font-size: 0.95rem;
            }

            .example-box {
                margin: 12px;
                font-size: 0.92rem;
                padding: 12px;
            }

            .chat-box {
                padding: 12px;
                gap: 12px;
                max-height: none;
            }

            .message {
                max-width: 92%;
                font-size: 0.95rem;
                line-height: 1.5;
            }

            .input-area {
                padding: 12px;
                position: sticky;
                bottom: 0;
            }

            .input-row input {
                padding: 14px;
                font-size: 16px;
            }

            button {
                min-height: 50px;
                font-size: 0.95rem;
                padding: 0 16px;
            }
        }
    </style>
</head>
<body>
    <div class="chat-wrapper">
        <div class="chat-header">
            <h1>AI Triage Chatbot</h1>
            <p>Describe your symptoms naturally and the chatbot will analyse them.</p>
        </div>

        <div class="example-box">
            Example: "I have fever, cough, headache, and chest pain for 2 days."
        </div>

        <div class="chat-box" id="chatBox">
            {% for msg in chat_history %}
                <div class="message-row {{ msg.sender }}">
                    <div class="message {{ msg.sender }}">{{ msg.text }}</div>
                </div>
            {% endfor %}
        </div>

        <div class="input-area">
            <div class="input-row">
                <input
                    type="text"
                    id="messageInput"
                    placeholder="Type your symptoms here..."
                    autocomplete="off"
                />
                <div class="button-group">
                    <button class="send-btn" onclick="sendMessage()">Send</button>
                    <button class="reset-btn" onclick="resetChat()">Reset</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById("chatBox");
        const messageInput = document.getElementById("messageInput");

        function appendMessage(sender, text) {
            const row = document.createElement("div");
            row.className = `message-row ${sender}`;

            const msg = document.createElement("div");
            msg.className = `message ${sender}`;
            msg.textContent = text;

            row.appendChild(msg);
            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            appendMessage("user", message);
            messageInput.value = "";

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();
                appendMessage("bot", data.reply);

                // Redirect to result page when all follow-ups are answered
                if (data.triage && !data.reply.includes("?")) {
                    setTimeout(() => {
                        window.location.href = "/result";
                    }, 2000);
                }

            } catch (error) {
                appendMessage("bot", "There was an error contacting the server.");
            }
        }

        async function resetChat() {
            try {
                await fetch("/reset", {
                    method: "POST"
                });
                chatBox.innerHTML = "";
                // Re-show welcome message after reset
                appendMessage("bot", "Hello! I'm your AI Triage Assistant.\n\nPlease describe your symptoms and I'll help assess the urgency of your appointment.\n\nExample: \"I have fever, cough, headache, and chest pain for 2 days.\"");
            } catch (error) {
                appendMessage("bot", "Could not reset chat.");
            }
        }

        messageInput.addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                sendMessage();
            }
        });

        // Show welcome message on first load if chat is empty
        window.addEventListener("load", () => {
            chatBox.scrollTop = chatBox.scrollHeight;
            if (chatBox.children.length === 0) {
                appendMessage("bot", "Hello! I'm your AI Triage Assistant.\n\nPlease describe your symptoms and I'll help assess the urgency of your appointment.\n\nExample: \"I have fever, cough, headache, and chest pain for 2 days.\"");
            }
        });
    </script>
</body>
</html>
